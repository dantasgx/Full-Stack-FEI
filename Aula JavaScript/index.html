<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <title>Aula JS</title>
</head>
<body>
    
    <h1>Aula JavaScript</h1>

    <div id="d1">Gabriel Dantas</div>

    <h2>Exemplo 1</h2>
    <p>Resposta: <span id="resp_ex1"></span></p>
    <h2>soma</h2>
    <div id="soma"></div>

    <h2>Exemplo 2</h2>
    <input type="text" id="in_ex">
    <input type="button" value="incrementar" onclick="exemplo2()">
    <p>Resposta: <span id="resp_ex2"></span></p>

    <h3>Exemplo 3</h3>
    <p>Número 1: <input type="number" id="in_1_ex3"></p>
    <p>Número 2: <input type="number" id="in_2_ex3"></p>
    <input type="button" value="soma" onclick="exemplo3()">
    <p>Resposta: <span id="resp_ex3"></span></p>

    <h3>Exemplo 4</h3>
    <div onmouseover="exemplo4()">
        <p>Número 1: <input type="number" id="in_1_ex4"></p>
        <p>Número 2: <input type="number" id="in_2_ex4"></p>
        <p>Resposta: <span id="resp_ex4"></span></p>
    </div>
    
    <h2>Tipos de Input</h2>
    <p>Texto</p>
    <input type="text">
    <p>Número</p>
    <input type="number">
    <p>Data</p>
    <input type="date">
    <p>Senha</p>
    <input type="password">
    <p>Email</p>
    <input type="email"> 
    <p>Radio</p>
    <input type="radio">
    <p>Checkbox</p>
    <input type="checkbox">



    <script src="script.js"></script>
</body>
</html>
